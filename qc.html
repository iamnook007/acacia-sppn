<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no"/>
<title>QC — Acacia Intertech</title>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link href="https://fonts.googleapis.com/css2?family=Sarabun:wght@400;600;700&display=swap" rel="stylesheet"/>
<script src="https://cdnjs.cloudflare.com/ajax/libs/html5-qrcode/2.3.8/html5-qrcode.min.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-check-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore-compat.js"></script>
<style>
/* ====== BASE ====== */
:root {
  --bg:#0F1923; --surface:#162232; --surface2:#1A2B3C;
  --border:rgba(255,255,255,0.07);
  --text:#F0F4F8; --text2:#6B7D8E; --text3:#3A4D5C;
  --accent:#4A90D9; --accent-dark:#1B4F8A;
  --green:#2E7D40; --green2:#2E9C5A;
  --red:#DC2626;
  --radius:14px;
}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
body{font-family:'Sarabun',sans-serif;background:var(--bg);color:var(--text)}

/* ====== SCREENS ====== */
.screen{display:none}
.screen.active{display:block}
#screen-home.active{display:flex;flex-direction:column;height:100vh;height:100dvh;overflow:hidden}
#screen-checklist.active{display:flex;flex-direction:column;height:100vh;height:100dvh;overflow:hidden}

/* ====== LOGIN ====== */
.login-wrap{
  min-height:100vh;display:flex;flex-direction:column;
  align-items:center;justify-content:center;padding:32px 24px;
  background:linear-gradient(160deg,#1B4F8A 0%,#0F1923 100%);
}
.login-logo{
  width:76px;height:76px;border-radius:20px;
  background:rgba(255,255,255,0.1);border:1px solid rgba(255,255,255,0.2);
  display:flex;align-items:center;justify-content:center;
  font-size:1.5rem;font-weight:700;color:#fff;letter-spacing:0.5px;
  margin-bottom:20px;
}
.login-title{color:#fff;font-size:1.6rem;font-weight:700;text-align:center;margin-bottom:6px}
.login-sub{color:rgba(255,255,255,0.55);font-size:0.88rem;text-align:center;margin-bottom:44px}
.btn-google{
  display:flex;align-items:center;gap:12px;
  background:#fff;color:#1a1a1a;border:none;border-radius:12px;
  padding:14px 28px;font-family:inherit;font-size:1rem;font-weight:700;
  cursor:pointer;box-shadow:0 4px 20px rgba(0,0,0,0.3);
}
.btn-google:active{transform:scale(0.97)}

/* ====== HOME ====== */
.status-bar{display:none}

.app-header{
  display:flex;align-items:center;gap:10px;
  padding:8px 20px 10px;flex-shrink:0;
}
.ac-logo{
  width:42px;height:42px;border-radius:50%;flex-shrink:0;
  background:linear-gradient(135deg,var(--accent-dark),var(--accent));
  display:flex;align-items:center;justify-content:center;
  font-size:0.78rem;font-weight:700;color:#fff;letter-spacing:0.5px;
}
.app-info{flex:1}
.app-company{font-size:0.94rem;font-weight:700;color:var(--text);line-height:1.2}
.app-subtitle{font-size:0.75rem;color:var(--text2)}
.home-avatar{
  width:36px;height:36px;border-radius:50%;object-fit:cover;flex-shrink:0;
  border:2px solid rgba(255,255,255,0.12);cursor:pointer;
}
.home-initials{
  width:36px;height:36px;border-radius:50%;flex-shrink:0;
  background:var(--surface2);border:2px solid rgba(255,255,255,0.12);
  display:flex;align-items:center;justify-content:center;
  font-size:0.75rem;font-weight:700;color:var(--text2);cursor:pointer;
}

.progress-section{
  margin:0 16px 4px;padding:14px 16px;
  background:var(--surface);border-radius:var(--radius);flex-shrink:0;
}
.progress-row1{display:flex;align-items:center;justify-content:space-between;margin-bottom:8px}
.progress-label{font-size:0.72rem;font-weight:700;color:var(--text2);text-transform:uppercase;letter-spacing:0.06em}
.progress-pct{font-size:0.9rem;font-weight:700;color:var(--accent)}
.progress-track{height:4px;background:rgba(255,255,255,0.07);border-radius:2px;overflow:hidden;margin-bottom:8px}
.progress-fill{height:100%;background:linear-gradient(90deg,var(--accent-dark),var(--accent));border-radius:2px;transition:width 0.6s ease;width:0%}
.progress-counts{display:flex;align-items:baseline;gap:4px}
.progress-done{font-size:1.05rem;font-weight:700;color:var(--text)}
.progress-total{font-size:0.8rem;color:var(--text3)}

.scan-hero{
  flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;
  cursor:pointer;user-select:none;gap:14px;padding:20px;
}
.scan-circle{
  width:200px;height:200px;border-radius:32px;
  background:linear-gradient(145deg,#1B4F8A,#0D3060);
  border:1.5px solid rgba(74,144,217,0.2);
  display:flex;align-items:center;justify-content:center;
  box-shadow:0 8px 32px rgba(13,48,96,0.5),0 0 0 10px rgba(74,144,217,0.05);
  transition:transform 0.15s;
}
.scan-hero:active .scan-circle{transform:scale(0.95)}
.scan-hero-label{font-size:1rem;font-weight:700;color:var(--text)}
.scan-hero-sub{font-size:0.82rem;color:var(--text2);margin-top:-6px}

.home-indicator{flex-shrink:0;height:22px;display:flex;align-items:center;justify-content:center}
.home-indicator::after{content:'';display:block;width:36px;height:4px;background:rgba(255,255,255,0.15);border-radius:2px}

/* ====== SCANNER OVERLAY ====== */
#scanner-overlay{
  position:fixed;inset:0;z-index:300;background:#000;
  display:none;flex-direction:column;
}
#scanner-overlay.show{display:flex}
.scanner-top{
  display:flex;align-items:center;justify-content:space-between;
  padding:14px 20px;background:rgba(0,0,0,0.7);flex-shrink:0;
}
.scanner-top-title{font-size:0.95rem;font-weight:700;color:#fff}
.btn-cancel-scan{
  background:rgba(255,255,255,0.12);color:#fff;
  border:1px solid rgba(255,255,255,0.2);border-radius:8px;
  padding:6px 14px;font-family:inherit;font-size:0.85rem;cursor:pointer;
}
#qr-reader{flex:1;min-height:0}
#qr-reader video{width:100% !important;height:100% !important;object-fit:cover}
#qr-reader img{display:none !important}
.scanner-hint{padding:16px;text-align:center;font-size:0.82rem;color:rgba(255,255,255,0.5);flex-shrink:0}

/* ====== CHECKLIST SCREEN ====== */
.checklist-header{
  display:flex;align-items:center;gap:12px;
  padding:12px 16px;background:var(--surface);flex-shrink:0;
  border-bottom:1px solid var(--border);
}
.btn-back{
  width:36px;height:36px;border-radius:50%;
  background:rgba(255,255,255,0.07);border:none;color:var(--text);
  font-size:1.1rem;cursor:pointer;display:flex;align-items:center;justify-content:center;
}
.checklist-title{font-size:0.95rem;font-weight:700}

.checklist-body{flex:1;overflow-y:auto;padding:16px;-webkit-overflow-scrolling:touch}

.asset-card{border-radius:var(--radius);padding:14px 16px;margin-bottom:16px}
.asset-card.blue{background:rgba(27,79,138,0.15);border:1px solid rgba(27,79,138,0.4)}
.asset-card.green{background:rgba(46,125,64,0.12);border:1px solid rgba(46,125,64,0.3)}
.asset-badge{
  display:inline-block;font-size:0.72rem;font-weight:700;
  padding:3px 9px;border-radius:20px;margin-bottom:8px;
}
.asset-badge.blue{background:rgba(74,144,217,0.2);color:var(--accent)}
.asset-badge.green{background:rgba(46,125,64,0.25);color:#5DBF72}
.asset-box{font-size:1.35rem;font-weight:700;color:var(--text);line-height:1.2;margin-bottom:3px}
.asset-site{font-size:0.82rem;color:var(--text2)}
.asset-id-small{font-size:0.72rem;color:var(--text3);margin-top:2px}

.qc-already-done{
  background:rgba(46,125,64,0.12);border:1px solid rgba(46,125,64,0.3);
  border-radius:10px;padding:11px 14px;font-size:0.82rem;color:#5DBF72;margin-bottom:14px;
}

.checklist-section-title{
  font-size:0.7rem;font-weight:700;color:var(--text3);
  text-transform:uppercase;letter-spacing:0.07em;margin-bottom:10px;
}
.checklist-items{display:flex;flex-direction:column;gap:8px;margin-bottom:16px}
.checklist-item{
  display:flex;align-items:center;gap:12px;
  background:var(--surface);border-radius:10px;padding:13px 14px;
  cursor:pointer;border:1px solid var(--border);
  transition:background 0.12s,border-color 0.12s;user-select:none;
}
.checklist-item.checked{background:rgba(46,125,64,0.1);border-color:rgba(46,125,64,0.4)}
.check-box{
  width:22px;height:22px;border-radius:50%;border:2px solid var(--text3);
  display:flex;align-items:center;justify-content:center;flex-shrink:0;
  transition:background 0.12s,border-color 0.12s;
}
.checklist-item.checked .check-box{background:var(--green);border-color:var(--green)}
.check-mark{color:#fff;font-size:0.72rem;font-weight:700;display:none}
.checklist-item.checked .check-mark{display:block}
.check-num{font-size:0.68rem;font-weight:700;color:var(--text3)}
.checklist-item.checked .check-num{display:none}
.check-label{font-size:0.88rem;color:var(--text);flex:1;line-height:1.4}
.checklist-item.checked .check-label{color:rgba(240,244,248,0.6)}

.no-qc-notice{
  background:var(--surface);border-radius:var(--radius);padding:20px;
  text-align:center;color:var(--text2);font-size:0.9rem;
  border:1px solid var(--border);margin-bottom:16px;
}

.checklist-bottom{
  flex-shrink:0;padding:12px 16px 24px;background:var(--bg);
  border-top:1px solid var(--border);
}
.btn-pass-qc{
  width:100%;padding:16px;border:none;border-radius:14px;
  font-family:inherit;font-size:1rem;font-weight:700;cursor:pointer;
  transition:opacity 0.15s;
}
.btn-pass-qc.enabled{
  background:linear-gradient(135deg,var(--green),var(--green2));
  color:#fff;box-shadow:0 4px 16px rgba(46,125,64,0.3);
}
.btn-pass-qc.disabled{
  background:var(--surface2);color:var(--text3);cursor:not-allowed;
}

/* ====== TOAST ====== */
.toast{
  position:fixed;bottom:24px;left:50%;transform:translateX(-50%);
  background:var(--surface2);color:var(--text);padding:11px 20px;
  border-radius:10px;font-size:0.92rem;font-weight:600;white-space:nowrap;
  opacity:0;transition:opacity 0.2s;pointer-events:none;z-index:999;
}
.toast.show{opacity:1}
.toast.success{background:var(--green)}
.toast.error{background:var(--red)}
.toast.gray{background:#546E7A}

/* ====== QC-DONE POPUP ====== */
#qcdone-overlay{
  display:none;position:fixed;inset:0;background:rgba(0,0,0,0.55);
  align-items:flex-end;justify-content:center;z-index:1100;
}
#qcdone-overlay.show{display:flex}
#qcdone-sheet{
  background:#1A1200;border:1.5px solid #F59E0B;
  border-radius:20px 20px 0 0;padding:28px 24px 36px;
  width:100%;max-width:480px;box-sizing:border-box;
}
.qcdone-icon{font-size:2rem;margin-bottom:8px}
.qcdone-title{color:#FCD34D;font-size:1.05rem;font-weight:700;margin-bottom:4px}
.qcdone-msg{color:#FDE68A;font-size:0.88rem;line-height:1.5;margin-bottom:20px}
#qcdone-ok{
  width:100%;padding:14px;background:#F59E0B;color:#000;
  font-size:1rem;font-weight:700;border:none;border-radius:12px;cursor:pointer;
}
</style>
</head>
<body>

<!-- ====== LOGIN ====== -->
<div id="screen-login" class="screen active">
  <div class="login-wrap">
    <div class="login-logo">AC</div>
    <h1 class="login-title">Quality Control</h1>
    <p class="login-sub">Acacia Intertech — ตรวจรับครุภัณฑ์ สป.พน.</p>
    <button id="btn-google-login" class="btn-google">
      <svg width="20" height="20" viewBox="0 0 48 48">

<!-- ====== HOME ====== -->
<div id="screen-home" class="screen">
  <div class="status-bar">
    <span class="status-time" id="status-time">00:00</span>
    <div class="status-right">
      <span>▲▲▲</span><span>WiFi</span><span>🔋</span>

<!-- ====== SCANNER OVERLAY ====== -->
<div id="scanner-overlay">

<!-- ====== CHECKLIST ====== -->
<div id="screen-checklist" class="screen">
  <div class="checklist-header">
    <button class="btn-back" id="btn-back">←</button>

<!-- QC-DONE POPUP -->
<div id="qcdone-overlay">

<script>
const FIREBASE_CONFIG = {
  apiKey:            'AIzaSyA-F0uH5WcyNpxpUNe7oXDG0_z4vqczW50',
  authDomain:        'acacia-sppn.firebaseapp.com',
  projectId:         'acacia-sppn',
  storageBucket:     'acacia-sppn.firebasestorage.app',
  messagingSenderId: '846071482521',
  appId:             '1:846071482521:web:00f846689dec1029d0d008',
};
const RECAPTCHA_SITE_KEY = '6LeCPyYtAAAAAPPwl0IisCVWN8l3GpJOfHL-_OEO';
const QC_TOTAL = 461;

const DEVICE_LABEL = {
  PC1:'PC แบบที่ 1', PC2:'PC แบบที่ 2',
  Notebook:'Notebook', Tablet:'Tablet (iPad)', UPS2k:'UPS 2kVA',
};

const CHECKLIST_PC = [
  { key:'windowsActivate', label:'Windows Activate' },
  { key:'officeActivate',  label:'MS Office Activate' },
  { key:'noScratch',       label:'ตัวเครื่องไม่มีรอยขีดข่วน' },
  { key:'sticker',         label:'สติกเกอร์รับประกัน' },
  { key:'serialMatch',     label:'Serial Number ตรงกับ sticker' },
  { key:'displayTest',     label:'ทดสอบออก 2 จอ / ทดสอบเสียง' },
  { key:'accessories',     label:'อุปกรณ์ครบในกล่อง (PC, จอ, UPS, สาย)' },
];
const CHECKLIST_NB = [
  { key:'windowsActivate', label:'Windows Activate' },
  { key:'officeActivate',  label:'MS Office Activate' },
  { key:'noScratch',       label:'ตัวเครื่องไม่มีรอยขีดข่วน' },
  { key:'sticker',         label:'สติกเกอร์รับประกัน' },
  { key:'serialMatch',     label:'Serial Number ตรงกับ sticker' },
  { key:'displayTest',     label:'ทดสอบหน้าจอ / ทดสอบเสียง' },
  { key:'accessories',     label:'อุปกรณ์ครบในกล่อง (NB, Adaptor, Mouse, other)' },
];

firebase.initializeApp(FIREBASE_CONFIG);
firebase.appCheck().activate(RECAPTCHA_SITE_KEY, true);
const db   = firebase.firestore();
const auth = firebase.auth();

// ============================================================
// STATE
// ============================================================
let currentUser    = null;
let scanner        = null;
let scannerRunning = false;
let pendingDoc     = null;
let currentItems   = [];
let checklistState = {};
let toastTimer     = null;

// ============================================================
// CLOCK
// ============================================================
function updateClock() {
  const d = new Date();
  const el = document.getElementById('status-time');
  if (el) el.textContent =
    String(d.getHours()).padStart(2,'0') + ':' + String(d.getMinutes()).padStart(2,'0');
}
updateClock();
setInterval(updateClock, 15000);

// ============================================================
// AUTH
// ============================================================
auth.onAuthStateChanged(user => {
  if (user) {
    currentUser = user;
    setAvatar(user);
    showScreen('home');
    loadQCCount();
  } else {
    currentUser = null;
    showScreen('login');
  }
});

function setAvatar(user) {
  const img = document.getElementById('home-avatar-img');
  const ini = document.getElementById('home-avatar-ini');
  if (user.photoURL) {
    img.src = user.photoURL;
    img.style.display = 'block';
    ini.style.display = 'none';
  } else {
    ini.textContent = (user.displayName || user.email || 'U').slice(0, 2).toUpperCase();
    img.style.display = 'none';
    ini.style.display = 'flex';
  }
}

document.getElementById('btn-google-login').addEventListener('click', async () => {
  try {
    await auth.signInWithPopup(new firebase.auth.GoogleAuthProvider());
  } catch (err) {
    console.error(err);
    showToast('เข้าสู่ระบบไม่สำเร็จ', 'error');
  }
});

function promptLogout() {
  if (confirm('ออกจากระบบ?')) {
    stopScanner();
    auth.signOut();
  }
}

// ============================================================
// SCREENS
// ============================================================
function showScreen(name) {
  document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
  const el = document.getElementById('screen-' + name);
  if (el) el.classList.add('active');
}

// ============================================================
// PROGRESS
// ============================================================
async function loadQCCount() {
  try {
    const snap = await db.collection('installations')
      .where('qc.checkedBy', '>', '')
      .get();
    const count = snap.size;
    const p = Math.round((count / QC_TOTAL) * 100);
    document.getElementById('qc-done-count').textContent = count;
    document.getElementById('progress-pct').textContent  = p + '%';
    document.getElementById('progress-fill').style.width = p + '%';
  } catch (err) {
    console.warn('loadQCCount:', err.message);
  }
}

// ============================================================
// SCANNER
// ============================================================
document.getElementById('btn-home-scan').addEventListener('click', openScanner);
document.getElementById('btn-cancel-scan').addEventListener('click', closeScanner);

async function openScanner() {
  document.getElementById('scanner-overlay').classList.add('show');
  await new Promise(r => setTimeout(r, 80));
  await startScanner();
}

async function closeScanner() {
  await stopScanner();
  document.getElementById('scanner-overlay').classList.remove('show');
}

async function startScanner() {
  const readerEl = document.getElementById('qr-reader');
  if (scanner) { try { await scanner.stop(); } catch (e) {} }
  readerEl.innerHTML = '';
  scanner = new Html5Qrcode('qr-reader');
  try {
    await scanner.start(
      { facingMode: 'environment' },
      { fps: 10, qrbox: { width: 250, height: 250 } },
      onScanSuccess,
      () => {}
    );
    scannerRunning = true;
  } catch (err) {
    console.error('Camera error:', err);
    document.getElementById('scanner-overlay').classList.remove('show');
    showToast('ไม่สามารถเปิดกล้องได้', 'error');
  }
}

async function stopScanner() {
  if (scanner && scannerRunning) {
    try { await scanner.stop(); } catch (e) {}
    scannerRunning = false;
  }
}

async function onScanSuccess(sn) {
  await stopScanner();
  document.getElementById('scanner-overlay').classList.remove('show');
  await lookupSN(sn.trim());
}

// ============================================================
// LOOKUP
// ============================================================
async function lookupSN(sn) {
  try {
    const snap = await db.collection('installations')
      .where('serialNumbers.pc', '==', sn)
      .limit(1)
      .get();
    if (snap.empty) {
      showToast('ไม่พบเครื่องนี้ในระบบ', 'error');
      return;
    }
    pendingDoc = { docId: snap.docs[0].id, ...snap.docs[0].data() };
    if (pendingDoc.qc && pendingDoc.qc.checkedAt) {
      showQCDonePopup(pendingDoc);
      return;
    }
    buildChecklistScreen(pendingDoc);
  } catch (err) {
    console.error(err);
    showToast('เกิดข้อผิดพลาด: ' + err.message, 'error');
  }
}

// ============================================================
// CHECKLIST SCREEN
// ============================================================
function buildChecklistScreen(data) {
  const type = data.deviceType;
  const site = data.location?.siteName || data.location?.office || data.location?.province || '—';
  const isPC = type === 'PC1' || type === 'PC2';
  const isNB = type === 'Notebook';

  currentItems   = isPC ? CHECKLIST_PC : isNB ? CHECKLIST_NB : [];
  checklistState = {};
  currentItems.forEach(i => { checklistState[i.key] = false; });

  const cardCls  = isNB ? 'green' : 'blue';
  const badgeCls = isNB ? 'green' : 'blue';

  let qcDoneHtml = '';
  if (data.qc?.checkedBy) {
    const ts    = data.qc.checkedAt?.toDate ? data.qc.checkedAt.toDate() : new Date();
    const dtStr = ts.toLocaleDateString('th-TH', { day:'numeric', month:'short', year:'numeric' })
                + ' ' + ts.toLocaleTimeString('th-TH', { hour:'2-digit', minute:'2-digit' });
    qcDoneHtml = `<div class="qc-already-done">✓ QC แล้วโดย ${data.qc.checkedBy} เมื่อ ${dtStr}</div>`;
  }

  let listHtml = '';
  if (currentItems.length === 0) {
    listHtml = '<div class="no-qc-notice">ประเภทนี้ไม่ต้อง QC</div>';
  } else {
    listHtml = `
      <div class="checklist-section-title">รายการตรวจสอบ (${currentItems.length} ข้อ)</div>
      <div class="checklist-items">
        ${currentItems.map((item, i) => `
          <div class="checklist-item" id="ci-${item.key}" onclick="toggleCheck('${item.key}')">
            <div class="check-box">
              <span class="check-num">${i + 1}</span>
              <span class="check-mark">✓</span>
            </div>
            <span class="check-label">${item.label}</span>
          </div>`).join('')}
      </div>`;
  }

  document.getElementById('checklist-body').innerHTML = `
    <div class="asset-card ${cardCls}">
      <div class="asset-badge ${badgeCls}">${DEVICE_LABEL[type] || type}</div>
      <div class="asset-box">กล่อง ${data.boxNumber || '—'}</div>
      <div class="asset-site">${site}</div>
      <div class="asset-id-small">${data.assetId || ''}</div>
    </div>
    ${qcDoneHtml}
    ${listHtml}`;

  updateQCButton();
  showScreen('checklist');
}

function toggleCheck(key) {
  if (!(key in checklistState)) return;
  checklistState[key] = !checklistState[key];
  document.getElementById('ci-' + key)?.classList.toggle('checked', checklistState[key]);
  updateQCButton();
}

function updateQCButton() {
  const btn   = document.getElementById('btn-pass-qc');
  const total = currentItems.length;
  if (total === 0) {
    btn.className = 'btn-pass-qc disabled';
    btn.disabled  = true;
    btn.textContent = 'ประเภทนี้ไม่ต้อง QC';
    return;
  }
  const count   = currentItems.filter(i => checklistState[i.key]).length;
  const allDone = count === total;
  btn.className   = allDone ? 'btn-pass-qc enabled' : 'btn-pass-qc disabled';
  btn.disabled    = !allDone;
  btn.textContent = allDone ? '✓ ผ่าน QC' : `ผ่าน QC — ติ๊กให้ครบก่อน (${count}/${total})`;
}

document.getElementById('btn-back').addEventListener('click', () => {
  pendingDoc = null;
  showScreen('home');
});

document.getElementById('btn-pass-qc').addEventListener('click', async () => {
  if (!pendingDoc || currentItems.length === 0) return;
  if (!currentItems.every(i => checklistState[i.key])) return;

  const btn = document.getElementById('btn-pass-qc');
  btn.disabled    = true;
  btn.textContent = 'กำลังบันทึก...';

  const checklistData = {};
  currentItems.forEach(i => { checklistData[i.key] = true; });

  try {
    await db.collection('installations').doc(pendingDoc.docId).update({
      qc: {
        checkedBy: currentUser.displayName || currentUser.email,
        checkedAt: firebase.firestore.FieldValue.serverTimestamp(),
        uid:       currentUser.uid,
        checklist: checklistData,
      },
    });
    showToast('QC สำเร็จ ✓', 'success');
    pendingDoc = null;
    showScreen('home');
    loadQCCount();
  } catch (err) {
    console.error(err);
    showToast('บันทึกไม่สำเร็จ: ' + err.message, 'error');
    btn.disabled = false;
    updateQCButton();
  }
});

// ============================================================
// TOAST
// ============================================================
function showToast(msg, type = '') {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.className   = 'toast show' + (type ? ' ' + type : '');
  if (toastTimer) clearTimeout(toastTimer);
  toastTimer = setTimeout(() => t.classList.remove('show'), 2800);
}

function showQCDonePopup(data) {
  const ts  = data.qc.checkedAt?.toDate ? data.qc.checkedAt.toDate() : new Date();
  const day = ts.toLocaleDateString('th-TH', { day:'numeric', month:'short', year:'2-digit' });
  const time = ts.toLocaleTimeString('th-TH', { hour:'2-digit', minute:'2-digit' });
  document.getElementById('qcdone-msg').textContent =
    `${data.assetId}  ตรวจโดย ${data.qc.checkedBy} เมื่อ ${day} ${time}`;
  document.getElementById('qcdone-overlay').classList.add('show');
}

document.getElementById('qcdone-ok').addEventListener('click', () => {
  document.getElementById('qcdone-overlay').classList.remove('show');
  openScanner();
});
</script>
